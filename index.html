<!DOCTYPE html>  
<html lang="en">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>Placid Designs</title>  
  
<style>  
:root {  
  --bg:#0f172a;  
  --text:#fff;  
  --primary:#38bdf8;  
}  
  
.light {  
  --bg:#fff;  
  --text:#000;  
}  
  
html { scroll-behavior: smooth; }  
  
body {  
  background: var(--bg);  
  color: var(--text);  
  font-family: Arial;  
  transition: 0.3s;  
  opacity:0;
}

body.loaded { opacity:1; }

/* CONTAINER */
.container {
  max-width:1100px;
  margin:auto;
  padding:20px;
}

/* NAV */
nav {  
  display:flex;  
  justify-content:space-between;  
  padding:15px 30px;  
  position:sticky;
  top:0;
  background:var(--bg);
  z-index:1000;
}  

nav a { color:var(--text); text-decoration:none; }

/* BUTTON */
.btn {
  display:inline-block;
  padding:12px 25px;
  background:var(--primary);
  color:#000;
  border-radius:8px;
  text-decoration:none;
  transition:0.3s;
}
.btn:hover {
  transform:translateY(-3px);
  box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

/* MENU */
.menu { position: relative; }

.menu button {
  background: var(--primary);
  border: none;
  padding: 8px 12px;
  color: #fff;
  cursor: pointer;
  border-radius: 5px;
}

.dropdown {
  display: none;
  position: absolute;
  right: 0;
  background: var(--bg);
  padding: 10px;
  border-radius: 8px;
}

.show { display: block; }

/* HERO */
.hero { text-align:center; padding:80px 20px; }
.hero span { color:var(--primary); }

/* SLIDER */
.slider { overflow:hidden; display:flex; justify-content:center; }

.slides {
  display:flex;
  gap:20px;
  transition: transform 1s ease;
}

.slide {
  flex:0 0 70%;
  position:relative;
  opacity:0.6;
  transform:scale(0.9);
}

.slide.active {
  opacity:1;
  transform:scale(1);
}

.slide img {
  width:100%;
  height:250px;
  object-fit:cover;
  border-radius:10px;
}

.slide p {
  position:absolute;
  bottom:10px;
  left:10px;
  background:rgba(0,0,0,0.6);
  padding:5px 10px;
  border-radius:5px;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
}

.grid img {
  width:100%;
  border-radius:10px;
  transition:0.3s;
  box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

.grid img:hover { transform:scale(1.08); }

/* SCROLL ANIMATION */
.reveal {
  opacity:0;
  transform:translateY(40px);
  transition:0.6s;
}

.reveal.active {
  opacity:1;
  transform:translateY(0);
}

/* WHATSAPP */
.whatsapp {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:#fff;
  padding:15px;
  border-radius:50%;
  text-decoration:none;
}

/* LOADER */
@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
</style>  
</head>  

<body>  

<div id="loader" style="position:fixed;width:100%;height:100%;background:#0f172a;display:flex;justify-content:center;align-items:center;z-index:9999;">
  <div style="width:40px;height:40px;border:5px solid #ccc;border-top:5px solid #38bdf8;border-radius:50%;animation:spin 1s linear infinite;"></div>
</div>

<nav>  
  <h2>Placid Designs</h2>  
  <div class="menu">
    <button onclick="toggleMenu()">☰</button>
    <div id="dropdown" class="dropdown">
      <a href="#home">Home</a>
      <a href="portfolio.html">Portfolio</a>
    </div>
  </div>
</nav>  

<section class="hero container reveal">
  <h1>I Design <span>Logos & Brands</span> That Stand Out</h1>
  <p>Fast. Clean. Professional designs for your business.</p>
  <a href="https://wa.me/2349135705008" class="btn">Hire Me Now</a>
</section>

<div class="slider">
  <div class="slides">
    <div class="slide"><img src="IMG_20260328_023804.png"><p>Book Covers</p></div>
    <div class="slide"><img src="IMG_20260328_024107.png"><p>Brands</p></div>
    <div class="slide"><img src="IMG_20260328_024230.png"><p>Cards</p></div>
    <div class="slide"><img src="IMG_20260328_024139.png"><p>Logos</p></div>
  </div>
</div>

<section class="container reveal">
<h2>Services</h2>
<p>Logo • Flyers • Branding</p>
</section>

<section class="container reveal">
<h2>Contact</h2>
<form action="https://formspree.io/f/mgopelny" method="POST">
<input type="text" name="name" placeholder="Your Name" required>
<input type="email" name="email" placeholder="Your Email" required>
<textarea name="message" placeholder="Message" required></textarea>
<button type="submit">Send</button>
</form>
</section>

<a class="whatsapp" href="https://wa.me/2349135705008">💬</a>

<script>
function toggleMenu(){
document.getElementById("dropdown").classList.toggle("show");
}
</script>

<script>
window.addEventListener("load",()=>{
document.body.classList.add("loaded");

const loader=document.getElementById("loader");
loader.style.opacity="0";
setTimeout(()=>loader.style.display="none",500);
});
</script>

<script>
const reveals=document.querySelectorAll(".reveal");
window.addEventListener("scroll",()=>{
reveals.forEach(el=>{
if(el.getBoundingClientRect().top<window.innerHeight-100){
el.classList.add("active");
}
});
});
</script>

<script>
let index=0;
const slides=document.querySelectorAll(".slide");
const track=document.querySelector(".slides");

function updateSlider(){
const w=slides[0].offsetWidth+20;
const c=document.querySelector(".slider").offsetWidth;
const offset=(c-w)/2;
track.style.transform=`translateX(${offset-(index*w)}px)`;
slides.forEach(s=>s.classList.remove("active"));
slides[index].classList.add("active");
}

setInterval(()=>{
index=(index+1)%slides.length;
updateSlider();
},10000);

updateSlider();
</script>

<footer style="text-align:center;padding:30px;opacity:0.7;">
© 2026 Placid Designs
</footer>

</body>  
</html>
