<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio - Placid Designs</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: #fff;
  margin: 0;
}

body {
  opacity: 0;
  transition: opacity 0.5s ease-in;
}

body.loaded {
  opacity: 1;
}

/* NAV */
nav {
  display:flex;
  justify-content:space-between;
  padding:15px 30px;
}

nav a {
  color:#fff;
  text-decoration:none;
  margin-left:15px;
}

/* TITLE */
h1 {
  text-align:center;
  margin: 20px;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
  gap: 15px;
  padding: 20px;
}

.grid img {
  width: 100%;
  border-radius: 10px;
  transition:0.3s;
}

.grid img:hover {
  transform: scale(1.05);
}

/* BACK BUTTON */
.back {
  background:#38bdf8;
  padding:8px 15px;
  border-radius:5px;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div id="loader" style="position:fixed; width:100%; height:100%; background:#0f172a; display:flex; justify-content:center; align-items:center; z-index:9999;">
  <div style="width:40px; height:40px; border:5px solid #ccc; border-top:5px solid #38bdf8; border-radius:50%; animation:spin 1s linear infinite;"></div>
</div>

<!-- NAVBAR -->
<nav>
  <h2>Placid Designs</h2>
  <div>
    <a href="index.html" class="back">⬅ Back</a>
  </div>
</nav>

<h1>Portfolio</h1>

<div class="grid">
  <img src="images/IMG_20260326_024832.jpg">
  <img src="images/IMG_20260326_024739.jpg">
  <img src="images/IMG_20260326_024916.jpg">
  <img src="images/IMG_20260325_151028.jpg">
</div>

<div id="previewBox" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); justify-content:center; align-items:center;">
  <img id="previewImg" style="max-width:90%; max-height:90%; border-radius:10px;">
</div>

<script>
window.addEventListener("load", () => {
  document.body.classList.add("loaded");
});

// Fade OUT before going to another page
document.querySelectorAll("a").forEach(link => {
  link.addEventListener("click", function(e) {
    if (this.href && !this.href.includes("#")) {
      e.preventDefault();
      document.body.classList.remove("loaded");

      setTimeout(() => {
        window.location = this.href;
      }, 300);
    }
  });
});
</script>

<script>
window.addEventListener("load", () => {
  document.getElementById("loader").style.display = "none";
});
</script>

<script>
const images = document.querySelectorAll(".grid img");
const previewBox = document.getElementById("previewBox");
const previewImg = document.getElementById("previewImg");

images.forEach(img => {
  img.addEventListener("click", () => {
    previewBox.style.display = "flex";
    previewImg.src = img.src;
  });
});

// Close when clicked
previewBox.addEventListener("click", () => {
  previewBox.style.display = "none";
});
</script>

<footer style="text-align:center; padding:20px;">
  placiddesignhub
</footer>

</body>
</html>
