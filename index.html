<!DOCTYPE html>  
<html lang="en">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>Placid Designs</title>  
  
<style>  
:root {  
  --bg:#0f172a;  
  --text:#fff;  
  --primary:#38bdf8;  
}  
  
.light {  
  --bg:#fff;  
  --text:#000;  
}  
  
html {  
  scroll-behavior: smooth;  
}  
  
body {  
  background: var(--bg);  
  color: var(--text);  
  font-family: Arial;  
  transition: 0.3s;  
}  

body {
  opacity: 0;
  transition: opacity 0.5s ease-in;
}

body.loaded {
  opacity: 1;
}
  
/* NAV */  
nav {  
  display:flex;  
  justify-content:space-between;  
  padding:15px 30px;  
}  
  
nav a {  
  margin-left:15px;  
  text-decoration:none;  
  color:var(--text);  
}  

/* MENU */
.menu {
  position: relative;
}

.menu button {
  background: var(--primary);
  border: none;
  padding: 8px 12px;
  color: #fff;
  cursor: pointer;
  border-radius: 5px;
}

.dropdown {
  display: none;
  position: absolute;
  right: 0;
  background: var(--bg);
  padding: 10px;
  border-radius: 8px;
}

.show {
  display: block;
}

.dropdown a {
  display: block;
  margin: 10px 0;
}
  
/* HERO */  
.hero {  
  text-align:center;  
  padding:80px 20px;  
  animation: fade 1.5s;  
}  
  
.hero span {color:var(--primary);}  
  
/* GRID */  
.grid {  
  display:grid;  
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));  
  gap:15px;  
  padding:20px;  
}  
  
.grid img {  
  width:100%;  
  border-radius:10px;  
  transition:0.3s;  
}  
  
.grid img:hover {  
  transform:scale(1.08);  
}  
  
/* CONTACT */  
form {  
  display:flex;  
  flex-direction:column;  
  max-width:400px;  
  margin:auto;  
  gap:10px;  
}  
  
input,textarea {  
  padding:10px;  
  border-radius:5px;  
  border:none;  
}  
  
button {  
  padding:10px;  
  border:none;  
  background:var(--primary);  
  cursor:pointer;  
}  
  
/* WHATSAPP FLOAT */  
.whatsapp {  
  position:fixed;  
  bottom:20px;  
  right:20px;  
  background:#25D366;  
  color:#fff;  
  padding:15px;  
  border-radius:50%;  
  text-decoration:none;  
  font-size:20px;  
}  
  
/* ANIMATION */  
@keyframes fade {  
  from{opacity:0;}  
  to{opacity:1;}  
}  
</style>  
  
</head>  
<body>  
  
<nav>  
  <h2>Placid Designs</h2>  
  <div class="menu">
    <button onclick="toggleMenu()">☰ Menu</button>
    <div id="dropdown" class="dropdown">
      <a href="#home">Home</a>
      <a href="portfolio.html">Portfolio</a>
      <a href="#">Explore</a>
    </div>
  </div>
</nav>  
  
<section id="home" class="hero">  
  <h1>I’m a <span>Graphic Designer</span></h1>  
  <p>I create logos, flyers & branding</p>  
</section>    
  
<section id="contact">  
  <h2 style="text-align:center;">Contact Me</h2>  
  
  <!-- REAL EMAIL FORM -->  
  <form action="https://formspree.io/f/mgopelny" method="POST">  
    <input type="text" name="name" placeholder="Your Name" required>  
    <input type="email" name="email" placeholder="Your Email" required>  
    <textarea name="message" placeholder="Your Message" required></textarea>  
    <button type="submit">Send Message</button>  
  </form>  
</section>  
  
<!-- WHATSAPP BUTTON -->  
<a class="whatsapp" href="https://wa.me/2349135705008" target="_blank">💬</a>  
  
<script>  
function toggleMode(){  
  document.body.classList.toggle("light");  
}

function toggleMenu(){
  document.getElementById("dropdown").classList.toggle("show");
}  
</script>  

<script>
window.addEventListener("load", () => {
  document.body.classList.add("loaded");
});

// Fade OUT before going to another page
document.querySelectorAll("a").forEach(link => {
  link.addEventListener("click", function(e) {
    if (this.href && !this.href.includes("#")) {
      e.preventDefault();
      document.body.classList.remove("loaded");

      setTimeout(() => {
        window.location = this.href;
      }, 300);
    }
  });
});
</script>

<footer style="text-align:center; padding:20px;">
  placiddesignhub
</footer>
  
</body>  
</html>
