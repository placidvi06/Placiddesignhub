<style>  
:root {  
  --bg:#0f172a;  
  --text:#fff;  
  --primary:#38bdf8;  
}  
  
.light {  
  --bg:#fff;  
  --text:#000;  
}  
  
html {  
  scroll-behavior: smooth;  
}  
  
body {  
  background: var(--bg);  
  color: var(--text);  
  font-family: Arial;  
  transition: 0.3s;  
}  

body {
  opacity: 0;
  transition: opacity 0.5s ease-in;
}

body.loaded {
  opacity: 1;
}
  
/* NAV */  
nav {  
  display:flex;  
  justify-content:space-between;  
  padding:15px 30px;  
}  
  
nav a {  
  margin-left:15px;  
  text-decoration:none;  
  color:var(--text);  
}  

/* MENU */
.menu {
  position: relative;
}

.menu button {
  background: var(--primary);
  border: none;
  padding: 8px 12px;
  color: #fff;
  cursor: pointer;
  border-radius: 5px;
}

.dropdown {
  display: none;
  position: absolute;
  right: 0;
  background: var(--bg);
  padding: 10px;
  border-radius: 8px;
}

.show {
  display: block;
}

.dropdown a {
  display: block;
  margin: 10px 0;
}

.slider {
  overflow: hidden;
  max-width: 100%;
  margin-top: 20px;
}

/* SLIDER CONTAINER */
.slider {
  overflow: hidden;
  width: 100%;
  display: flex;
  justify-content: center;
}

/* TRACK */
.slides {
  display: flex;
  gap: 20px;
  transition: transform 1s ease;
}

/* EACH SLIDE */
.slide {
  flex: 0 0 70%;   /* center takes 70% */
  text-align: center;
  opacity: 0.6;
  transform: scale(0.9);
  transition: 0.5s;
}

/* ACTIVE CENTER */
.slide.active {
  opacity: 1;
  transform: scale(1);
}

/* IMAGE */
.slide img {
  width: 100%;
  height: 250px;
  object-fit: cover;
  border-radius: 10px;
}

.slide p {
  margin-top: 10px;
  color: var(--primary);
}
  
/* HERO */  
.hero {  
  text-align:center;  
  padding:80px 20px;  
  animation: fade 1.5s;  
}  
  
.hero span {color:var(--primary);}  
  
/* GRID */  
.grid {  
  display:grid;  
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));  
  gap:15px;  
  padding:20px;  
}  
  
.grid img {  
  width:100%;  
  border-radius:10px;  
  transition:0.3s;  
}  
  
.grid img:hover {  
  transform:scale(1.08);  
}  
  
/* CONTACT */  
form {  
  display:flex;  
  flex-direction:column;  
  max-width:400px;  
  margin:auto;  
  gap:10px;  
}  
  
input,textarea {  
  padding:10px;  
  border-radius:5px;  
  border:none;  
}  
  
button {  
  padding:10px;  
  border:none;  
  background:var(--primary);  
  cursor:pointer;  
}  
  
/* WHATSAPP FLOAT */  
.whatsapp {  
  position:fixed;  
  bottom:20px;  
  right:20px;  
  background:#25D366;  
  color:#fff;  
  padding:15px;  
  border-radius:50%;  
  text-decoration:none;  
  font-size:20px;  
}  
  
/* ANIMATION */  
@keyframes fade {  
  from{opacity:0;}  
  to{opacity:1;}  
}  

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
</style>  
  
</head>

<script>
window.addEventListener("load", () => {
  document.body.classList.add("loaded");
});

// Fade OUT before going to another page
document.querySelectorAll("a").forEach(link => {
  link.addEventListener("click", function(e) {
    if (this.href && !this.href.includes("#")) {
      e.preventDefault();
      document.body.classList.remove("loaded");

      setTimeout(() => {
        window.location = this.href;
      }, 300);
    }
  });
});
</script>

<script>
let index = 0;
const slides = document.querySelectorAll(".slide");
const track = document.querySelector(".slides");

let isPaused = false;
let startX = 0;

// UPDATE POSITION

function updateSlider() {
  const slideWidth = slides[0].offsetWidth + 20; // include gap
  const containerWidth = document.querySelector(".slider").offsetWidth;

  // THIS IS THE MAGIC (centering)
  const offset = (containerWidth - slideWidth) / 2;

  track.style.transform = `translateX(${offset - (index * slideWidth)}px)`;

  slides.forEach(s => s.classList.remove("active"));
  slides[index].classList.add("active");
}

// AUTO SLIDE
setInterval(() => {
  if (!isPaused) {
    index++;
    if (index >= slides.length) index = 0;
    updateSlider();
  }
}, 10000);

// HOLD TO PAUSE
track.addEventListener("touchstart", e => {
  isPaused = true;
  startX = e.touches[0].clientX;
});

track.addEventListener("touchend", e => {
  isPaused = false;
  let endX = e.changedTouches[0].clientX;

  if (startX > endX + 50) index++;
  else if (startX < endX - 50) index--;

  if (index >= slides.length) index = 0;
  if (index < 0) index = slides.length - 1;

  updateSlider();
});

// DESKTOP HOLD
track.addEventListener("mousedown", () => isPaused = true);
track.addEventListener("mouseup", () => isPaused = false);

// INIT
updateSlider();
</script>
