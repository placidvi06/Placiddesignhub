<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio - Placid Designs</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: #fff;
  margin: 0;
}

body {
  opacity: 0;
  transition: opacity 0.5s ease-in;
}

body.loaded {
  opacity: 1;
}

/* NAV */
nav {
  display:flex;
  justify-content:space-between;
  padding:15px 30px;
}

nav a {
  color:#fff;
  text-decoration:none;
  margin-left:15px;
}

/* TITLE */
h1 {
  text-align:center;
  margin: 20px;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
  gap: 15px;
  padding: 20px;
}

.grid img {
  width: 100%;
  border-radius: 10px;
  transition:0.3s;
}

.grid img:hover {
  transform: scale(1.05);
}

/* BACK BUTTON */
.back {
  background:#38bdf8;
  padding:8px 15px;
  border-radius:5px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
  <h2>Placid Designs</h2>
  <div>
    <a href="index.html" class="back">⬅ Back</a>
  </div>
</nav>

<h1>Portfolio</h1>

<div class="grid">
  <img src="images/IMG_20260326_024832.jpg">
  <img src="images/IMG_20260326_024739.jpg">
  <img src="images/IMG_20260326_024916.jpg">
  <img src="images/IMG_20260325_151028.jpg">
</div>

<script>
window.addEventListener("load", () => {
  document.body.classList.add("loaded");
});

// Fade OUT before going to another page
document.querySelectorAll("a").forEach(link => {
  link.addEventListener("click", function(e) {
    if (this.href && !this.href.includes("#")) {
      e.preventDefault();
      document.body.classList.remove("loaded");

      setTimeout(() => {
        window.location = this.href;
      }, 300);
    }
  });
});
</script>

<footer style="text-align:center; padding:20px;">
  placiddesignhub
</footer>

</body>
</html>
