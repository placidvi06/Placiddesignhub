<style>
body {
  background:#0f172a;
  color:#fff;
  font-family:Arial;

body.loaded {opacity:1;}

nav {
  display:flex;
  justify-content:space-between;
  padding:15px 30px;

  top:0;

}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));

  padding:20px;

.grid img {
  width:100%;
  border-radius:10px;
  transition:0.3s;
  box-shadow:0 10px 20px rgba(0,0,0,0.3);
}
.grid img:hover {transform:scale(1.05);}

.back {
  background:#38bdf8;
  padding:8px 15px;
  border-radius:5px;
  color:#000;
}
</style>
</head>
